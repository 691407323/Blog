<!doctype html>
<html>

  <title>{{ title or site_title or 'My Blog' }}</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div class="container">
      <h1><a href="/">{{ site_title or 'My Blog' }}</a></h1>

<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ title or site_title or 'My Blog' }}</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header>
    <div class="container" style="position:relative; display:flex; justify-content:center; align-items:center;">
      <a href="/" style="position:absolute; left:0; text-decoration:none; padding:8px 12px;">Home</a>
      <h1 style="margin:0;"><a href="/" style="text-decoration:none; color:inherit;">{{ site_title or 'ScvReady Blog' }}</a></h1>
    </div>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="container">
    <p style="text-align:center;">Copyright © {{ start_year }}-{{ current_year }} {{ site_title }} Powered by issues-blog.</p>
  </footer>
</body>
</html>

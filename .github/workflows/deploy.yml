name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Build site (detect project directory)
        run: |
          set -e
          if [ -f build.py ]; then DIR=.;
          elif [ -f blog/build.py ]; then DIR=blog;
          else
            echo "build.py not found in repo root or ./blog" >&2
            exit 2
          fi
          echo "Using project directory: $DIR"
          cd "$DIR"
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python build.py

      - name: Add CNAME for custom domain
        run: |
          set -e
          if [ -f build.py ]; then DIR=.;
          elif [ -f blog/build.py ]; then DIR=blog;
          else
            echo "build.py not found" >&2
            exit 2
          fi
          echo "blog.scvready.cc" > "$DIR/_site/CNAME"

      - name: Deploy to user-site repo
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          TARGET_REPO: 691407323/691407323.github.io
        run: |
          set -e
          if [ -f build.py ]; then DIR=.; elif [ -f blog/build.py ]; then DIR=blog; else
            echo "build.py not found" >&2
            exit 2
          fi
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf /tmp/target
          git clone https://x-access-token:${DEPLOY_TOKEN}@github.com/${TARGET_REPO}.git /tmp/target
          cd /tmp/target
          git rm -rf . || true
          cp -r $DIR/_site/. .
          git add -A
          if git commit -m "Deploy: ${GITHUB_REPOSITORY}@${GITHUB_SHA}"; then
            git push https://x-access-token:${DEPLOY_TOKEN}@github.com/${TARGET_REPO}.git HEAD:main
          else
            echo "No changes to deploy"
          fi
